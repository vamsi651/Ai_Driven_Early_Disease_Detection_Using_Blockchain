<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - {{ disease }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #312e81, #0f172a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .result-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 700px;
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            text-align: center;
        }

        .result-header {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .disease-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: white;
        }

        .prediction-box {
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .positive {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid #ef4444;
        }

        .negative {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
            border: 1px solid #10b981;
        }

        .probability {
            font-size: 1rem;
            margin-top: 0.5rem;
            opacity: 0.8;
        }

        .suggestions {
            text-align: left;
            background: rgba(15, 23, 42, 0.4);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        .suggestions h3 {
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .suggestions ul {
            list-style: none;
        }

        .suggestions li {
            margin-bottom: 0.8rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .suggestions li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--primary);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .action-btn {
            flex: 1;
            padding: 1rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-home {
            background: var(--primary);
            color: white;
        }

        .btn-dash {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="result-card">
        <p class="result-header">Analysis Result for</p>
        <h1 class="disease-name">{{ disease }}</h1>

        <div class="prediction-box {{ 'positive' if prediction == 'Positive' else 'negative' }}">
            {{ prediction }} Detected
            <div class="probability">Confidence Score: {{ probability }}</div>
        </div>

        <div class="suggestions">
            <h3>Recommendations</h3>
            <ul>
                {% for suggestion in suggestions %}
                <li>{{ suggestion }}</li>
                {% endfor %}
            </ul>
        </div>

        <div class="btn-group">
            <a href="/" class="action-btn btn-home">New Checkup</a>
            <a href="/dashboard" class="action-btn btn-dash">View Dashboard</a>
        </div>
    </div>
</body>

</html>
